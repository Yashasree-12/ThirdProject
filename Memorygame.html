<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

/* SCORE */
.scoreboard{
    font-size:22px;
    margin-top:10px;
}

/* TURN DISPLAY BIG */
.turn{
    font-size:32px;
    font-weight:bold;
    margin-top:15px;
    color:#38bdf8;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,130px);
    gap:18px;
    justify-content:center;
    margin-top:40px;
}

/* SMALLER CARDS */
.card{
    width:130px;
    height:130px;
    background:#1e293b;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    background:#334155;
    transform:scale(1.05);
}

button{
    margin-top:30px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🧠 Memory Game</h1>

<div class="scoreboard">
Player 1: <span id="p1">0</span> |
Player 2: <span id="p2">0</span>
</div>

<div class="turn" id="turn">Player 1 Turn</div>

<div class="grid" id="grid"></div>

<button onclick="location.reload()">Restart Game</button>

<script>

const emojis=[
"🍎","🍌","🍇","🍉",
"🍓","🍍","🥝","🍒",
"🍎","🍌","🍇","🍉",
"🍓","🍍","🥝","🍒"
];

let shuffled = emojis.sort(()=>Math.random()-0.5);

let firstCard=null;
let secondCard=null;
let lock=false;

let player=1;
let score1=0;
let score2=0;
let matches=0;

// PLAYER NAMES
let player1Name = prompt("Enter Player 1 Name:") || "Player 1";
let player2Name = prompt("Enter Player 2 Name:") || "Player 2";

document.getElementById("turn").textContent = player1Name + "'s Turn";

const grid=document.getElementById("grid");

shuffled.forEach((emoji)=>{

let card=document.createElement("div");
card.className="card";
card.innerHTML="?";
card.dataset.emoji=emoji;

card.onclick=function(){

if(lock || this.innerHTML!=="?") return;

this.innerHTML=this.dataset.emoji;

if(!firstCard){
firstCard=this;
return;
}

secondCard=this;
lock=true;

if(firstCard.dataset.emoji===secondCard.dataset.emoji){

matches++;

if(player===1){
score1++;
document.getElementById("p1").textContent=score1;
}
else{
score2++;
document.getElementById("p2").textContent=score2;
}

firstCard=null;
secondCard=null;
lock=false;

if(matches===8){
setTimeout(()=>{

let winner;

if(score1>score2) winner = player1Name;
else if(score2>score1) winner = player2Name;
else winner = "It's a Draw";

alert("🏆 " + winner);

},300);
}

}
else{

setTimeout(()=>{

firstCard.innerHTML="?";
secondCard.innerHTML="?";

firstCard=null;
secondCard=null;
lock=false;

player = player===1 ? 2 : 1;

let currentName = player===1 ? player1Name : player2Name;
document.getElementById("turn").textContent = currentName + "'s Turn";

},900);

}

};

grid.appendChild(card);

});

</script>

</body>
</html>
